name: Check football sources

on:
  schedule:
    - cron: '45 5 * * *'
  workflow_dispatch:
  push:
    paths:
      - index.html
      - scripts/check-football-sources.mjs
      - .github/workflows/check-football-sources.yml

permissions:
  contents: read

concurrency:
  group: check-football-sources
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check football sources
        run: node scripts/check-football-sources.mjs
