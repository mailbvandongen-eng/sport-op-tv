name: Check PDC darts schedule

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:
  push:
    paths:
      - index.html
      - scripts/check-pdc-darts-schedule.mjs
      - .github/workflows/check-pdc-darts-schedule.yml

permissions:
  contents: read

concurrency:
  group: check-pdc-darts-schedule
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check PDC darts schedule
        run: node scripts/check-pdc-darts-schedule.mjs
